services:
  db:
    image: postgres:16-alpine
    container_name: resource-pool-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: resource_pool
      POSTGRES_PASSWORD: resource_pool_password
      POSTGRES_DB: resource_pool
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resource_pool -d resource_pool"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: resource-pool-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://resource_pool:resource_pool_password@db:5432/resource_pool?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      NEXT_PUBLIC_APP_NAME: Resource Pool Management System
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  postgres-data:
