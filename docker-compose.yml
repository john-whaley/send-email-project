services:
  postgres:
    image: postgres:16-alpine
    container_name: resource-pool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resource_pool_password}
      POSTGRES_DB: ${POSTGRES_DB:-resource_pool}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-resource_pool}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: resource-pool-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-resource_pool_password}@postgres:5432/${POSTGRES_DB:-resource_pool}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-a-long-random-secret}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Resource Pool Management System}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_VIEWER_USERNAME: ${SEED_VIEWER_USERNAME:-viewer}
      SEED_VIEWER_PASSWORD: ${SEED_VIEWER_PASSWORD:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    name: postgres_data
